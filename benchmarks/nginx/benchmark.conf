events {
    use epoll;
    worker_connections 1024;
    multi_accept on;
}
worker_cpu_affinity auto;
worker_processes auto;

http {
  access_log off;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  keepalive_timeout 65;
  keepalive_requests 10000;

  upstream backend {
      server 127.0.0.2:8000;
      keepalive 64;
  }

  server {
      listen 127.0.0.1:4000 ssl;
      server_name darius.local.porto;

      ssl_certificate     /home/darius/Projects/porto/credentials/_wildcard.local.porto.pem;
      ssl_certificate_key /home/darius/Projects/porto/credentials/_wildcard.local.porto-key.pem;

      location / {
          proxy_pass http://127.0.0.2:8000;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }
  }
}
