on:
  pull_request: 
    branches:
      - main
  push:
    branches:
      - main  # triggers on every push to main, no tags needed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: cargo build --release --bin porto

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest
          files: target/release/porto
          prerelease: true  # common convention for rolling releases
